# home sdf frame; nav→pick/drop; pick_model↔sdf

motion:
  loop_rate_hz: 20.0
  mission_time_limit_sec: 600.0
  per_waypoint_timeout_sec: 100.0
  pos_tol: 0.28
  v_max: 0.38
  w_max: 1.0
  # yaw gate
  nav_align_yaw_tol_rad: 0.1
  rotate_to_goal_gain: 2.4
  approach_linear_gain: 0.48
  # pick spacing
  pick_target_distance_m: 0.01
  pick_approach_v_max: 0.05
  pick_approach_timeout_sec: 35.0
  # bin hold
  drop_approach_standoff_m: 0.47

progress:
  movement_time_allowance_sec: 12.0
  required_movement_radius: 0.45

recovery:
  spin_duration_sec: 1.1
  spin_w: 0.85
  backup_duration_sec: 0.65
  backup_v: -0.14
  wait_after_recovery_sec: 0.35
  min_rear_clearance_for_backup: 0.42

obstacle:
  front_stop: 0.38
  front_slow: 0.62
  rear_check_deg: 55
  wall_follow_enable: true
  wall_follow_trigger_front_m: 0.6
  wall_follow_stuck_before_sec: 3.5
  wall_follow_max_duration_sec: 10.0
  wall_follow_linear_m_s: 0.12
  wall_follow_angular_gain: 2.0
  wall_follow_desired_side_m: 0.38

telemetry:
  publish_goal_markers: true

# bin xy
drop_zone:
  center_x: 8.5
  center_y: 9.0

# arm rad; magnet R = urdf sphere
arm:
  wait_stream_arm: true
  wait_arm_hz: 20.0
  wait_stream_pose: {shoulder: -0.00006, elbow: 0.0, wrist: -0.00017}
  bootstrap_hold_hz: 20.0
  # spawn hold
  bootstrap_stages:
    - {shoulder: -0.00006, elbow: 0.0, wrist: -0.00017, settle: 1.2}
  # drop dwell
  settle_drop: 1.05
  pick_pose_stream_sec: 0.45
  pick_pose_stream_hz: 28.0
  drop_pose_stream_sec: 0.35
  drop_pose_stream_hz: 28.0
  stage_settle_sec: 0.72
  attach_wait_sec: 2.5
  attach_wait_arm_hz: 5.0
  stages:
    stage1: {shoulder: -0.00006, elbow: 0.0, wrist: -0.00017}
    stage2: {shoulder: -0.00006, elbow: 0.0, wrist: -0.95}
    stage3: {shoulder: -0.18, elbow: 0.0, wrist: -0.95}
  pick_magnet_pause: 0.55
  drop_magnet_pause: 0.4
  pick_creep_sec: 0.0
  drop_creep_sec: 0.0
  magnet_attach_radius_m: 0.13
  magnet_reach_slop_m: 0.02
  enforce_magnet_reach: true

waypoints:
  # can
  - {x: 1.5, y: 8.22, name: Align — can}
  - {x: 1.5, y: 7.2, name: Stand + pick — can, pick_after: true, pick_model: can}
  - {x: 3.5, y: 8.8, name: Transit → box}
  - {x: 8.35, y: 9.05, name: Drop — can, release_magnet: true}
  # block_2
  - {x: -1.0, y: 8.6, name: Transit → block_2}
  - {x: -2.5, y: 8.72, name: Align — toy_block_2}
  - {x: -2.5, y: 7.7, name: Stand + pick — toy_block_2, pick_after: true, pick_model: toy_block_2}
  - {x: 0.5, y: 8.9, name: Transit → box}
  - {x: 8.35, y: 9.05, name: Drop — toy_block_2, release_magnet: true}
  # cylinder
  - {x: -5.0, y: 7.6, name: Transit → cylinder}
  - {x: -7.0, y: 7.72, name: Align — toy_cylinder_1}
  - {x: -7.0, y: 6.7, name: Stand + pick — toy_cylinder_1, pick_after: true, pick_model: toy_cylinder_1}
  - {x: -3.0, y: 8.2, name: Transit → box}
  - {x: 8.35, y: 9.05, name: Drop — toy_cylinder_1, release_magnet: true}
  # block_1
  - {x: -4.5, y: 5.5, name: Transit → block_1}
  - {x: -5.0, y: 4.22, name: Align — toy_block_1}
  - {x: -5.0, y: 3.2, name: Stand + pick — toy_block_1, pick_after: true, pick_model: toy_block_1}
  - {x: -2.5, y: 4.8, name: Transit → door}
  - {x: 8.35, y: 9.05, name: Drop — toy_block_1, release_magnet: true}
  # door
  - {x: -2.0, y: 5.2, name: Door approach}
  - {x: 1.0, y: 5.0, name: Through doorway}
  # block_3
  - {x: 5.0, y: 6.2, name: Transit → block_3}
  - {x: 8.0, y: 7.72, name: Align — toy_block_3}
  - {x: 8.0, y: 6.7, name: Stand + pick — toy_block_3, pick_after: true, pick_model: toy_block_3}
  - {x: 6.5, y: 7.5, name: Transit → box}
  - {x: 8.35, y: 9.05, name: Drop — toy_block_3, release_magnet: true}
  # ball
  - {x: 6.0, y: 4.22, name: Align — ball}
  - {x: 6.0, y: 3.2, name: Stand + pick — ball, pick_after: true, pick_model: ball}
  - {x: 7.8, y: 5.5, name: Transit → box}
  - {x: 8.45, y: 9.05, name: Drop — ball, release_magnet: true}
