# driftbot_task — keep this small; logic is in task_node.py

motion:
  v_max: 0.28
  turn_k: 0.65
  turn_w_max: 0.36
  heading_tol_rad: 0.05
  turn_hz: 30.0
  loop_hz: 20.0
  brake_iters: 12
  pos_tol: 0.14
  # Pre-drop: stop band for hard +Y drive after IMU face π/2 (see task_node).
  pre_drop_pos_tol: 0.055
  drive_odom_step_cap: true
  drive_brake_at_goal: true
  drive_timeout_sec: 120.0
  turn_timeout_sec: 45.0
  approach_k: 0.45
  slow_radius_m: 0.55
  v_near_max: 0.08
  v_crawl_min: 0.03
  pause_sec: 0.3
  halt_pause_sec: 0.55
  # If the robot always yaws the wrong way in sim, try -1.0 (ROS/GZ sign quirk).
  cmd_vel_angular_scale: 1.0
  # Toy-leg in-place spins require /imu/data (no time-based fallback).
  imu_wait_timeout_sec: 90.0
  pre_drop_y: 8.5
  pre_drop_turn_rad: 1.5708

drop_zone:
  center_x: 8.5
  center_y: 9.0

arm:
  stage_settle_sec: 0.72
  settle_drop: 1.0
  attach_wait_sec: 1.2
  attach_hz: 5.0
  pick_magnet_pause: 0.25
  drop_magnet_pause: 0.4
  pick_standoff_m: 0.22
  pick_pose_stream_sec: 0.28
  pick_pose_stream_hz: 28.0
  # Let arm settle; pulse attach via ROS bridge (see gz_bridge.yaml).
  attach_pre_delay_sec: 0.22
  attach_burst_count: 3
  attach_burst_period_sec: 0.1
  attach_resend_sec: 0.32
  drop_pose_stream_sec: 0.35
  drop_pose_stream_hz: 28.0
  stages:
    stage1: {shoulder: -0.00006, elbow: 0.0, wrist: -0.00017}
    stage2: {shoulder: -0.00006, elbow: 0.0, wrist: -1.309}
    stage3: {shoulder: -0.63, elbow: 0.0, wrist: -1.309}
